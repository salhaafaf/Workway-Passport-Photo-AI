name: passport_photo_ai
description: A complete AI-powered Passport Photo generator with face detection, background removal, suit overlay, and printable A4 grid generator.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  google_mlkit_face_detection: ^0.7.0
  image: ^4.1.3
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.2
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/suits/
    - assets/suits/black_blazer.png
